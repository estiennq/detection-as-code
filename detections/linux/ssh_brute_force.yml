title: SSH Brute Force Attempt
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: Detects multiple failed SSH login attempts from a single source IP
references:
    - https://attack.mitre.org/techniques/T1110/
author: Quentin Estienne
date: 2026/06/22
tags:
    - attack.t1110.001
logsource:
    product: linux
    service: auth
detection:
    selection:
        Message|contains: 'Failed password'
    condition: selection
level: medium
falsepositives:
    - Legitimate users mistyping their password
